<svg xmlns="http://www.w3.org/2000/svg" width="800" height="240" viewBox="0 0 800 240">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1220" />
      <stop offset="40%" style="stop-color:#121a2e" />
      <stop offset="100%" style="stop-color:#080e18" />
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f5d89a" />
      <stop offset="50%" style="stop-color:#e8b84b" />
      <stop offset="100%" style="stop-color:#c4922a" />
    </linearGradient>
    <linearGradient id="purple" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#b48eff" />
      <stop offset="100%" style="stop-color:#8B5CF6" />
    </linearGradient>
    <filter id="warm-glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#e8a84b" flood-opacity="0.3" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="purple-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#8B5CF6" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark blue background -->
  <rect width="800" height="240" fill="url(#bg)" rx="8"/>

  <!-- Subtle grid lines (like a conference table) -->
  <line x1="0" y1="60" x2="800" y2="58" stroke="#1e2a44" stroke-width="0.5" opacity="0.4"/>
  <line x1="0" y1="120" x2="800" y2="122" stroke="#1e2a44" stroke-width="0.5" opacity="0.3"/>
  <line x1="0" y1="180" x2="800" y2="178" stroke="#1e2a44" stroke-width="0.5" opacity="0.4"/>

  <!-- Ambient dots (like people around a table) -->
  <circle cx="120" cy="70" r="8" fill="#ff6b6b" opacity="0.15"/>
  <circle cx="220" cy="50" r="6" fill="#66bb6a" opacity="0.12"/>
  <circle cx="380" cy="65" r="7" fill="#f0e68c" opacity="0.1"/>
  <circle cx="520" cy="55" r="6" fill="#55aaff" opacity="0.12"/>
  <circle cx="640" cy="70" r="8" fill="#b48eff" opacity="0.15"/>
  <circle cx="720" cy="50" r="5" fill="#ff9944" opacity="0.1"/>

  <!-- Connection lines between dots -->
  <line x1="128" y1="70" x2="214" y2="50" stroke="#8B5CF6" stroke-width="0.5" opacity="0.15"/>
  <line x1="226" y1="50" x2="373" y2="65" stroke="#8B5CF6" stroke-width="0.5" opacity="0.12"/>
  <line x1="387" y1="65" x2="514" y2="55" stroke="#8B5CF6" stroke-width="0.5" opacity="0.15"/>
  <line x1="526" y1="55" x2="632" y2="70" stroke="#8B5CF6" stroke-width="0.5" opacity="0.12"/>

  <!-- Top decorative border -->
  <rect x="100" y="42" width="600" height="1" fill="#8B5CF6" opacity="0.2"/>
  <rect x="200" y="44" width="400" height="1" fill="#b48eff" opacity="0.15"/>

  <!-- Pixel chair left -->
  <g transform="translate(150, 80) scale(1)" opacity="0.4">
    <rect x="0" y="0" width="4" height="12" fill="#c4922a"/>
    <rect x="0" y="0" width="12" height="4" fill="#c4922a"/>
    <rect x="8" y="4" width="4" height="8" fill="#8B5E3C"/>
    <rect x="0" y="12" width="12" height="3" fill="#e8a84b"/>
  </g>

  <!-- Pixel chair right -->
  <g transform="translate(625, 80) scale(1)" opacity="0.4">
    <rect x="8" y="0" width="4" height="12" fill="#c4922a"/>
    <rect x="0" y="0" width="12" height="4" fill="#c4922a"/>
    <rect x="0" y="4" width="4" height="8" fill="#8B5E3C"/>
    <rect x="0" y="12" width="12" height="3" fill="#e8a84b"/>
  </g>

  <!-- ROUND — warm gold -->
  <text x="400" y="105" font-family="'Georgia', 'Times New Roman', serif" font-size="54" font-weight="bold" fill="url(#gold)" text-anchor="middle" filter="url(#warm-glow)" letter-spacing="14">ROUND</text>

  <!-- TABLE — purple -->
  <text x="400" y="145" font-family="'Georgia', 'Times New Roman', serif" font-size="30" font-weight="bold" fill="url(#purple)" text-anchor="middle" filter="url(#purple-glow)" letter-spacing="22">T A B L E</text>

  <!-- Bottom decorative border -->
  <rect x="200" y="160" width="400" height="1" fill="#b48eff" opacity="0.15"/>
  <rect x="100" y="162" width="600" height="1" fill="#8B5CF6" opacity="0.2"/>

  <!-- Tagline -->
  <text x="400" y="188" font-family="'Georgia', serif" font-size="13" fill="#8B9CB8" text-anchor="middle" opacity="0.8">25 Experts  ·  11 Roles  ·  One Prompt</text>

  <!-- Sub-tagline -->
  <text x="400" y="210" font-family="'Georgia', serif" font-size="11" fill="#8B9CB8" text-anchor="middle" opacity="0.5">Multi-expert roundtable discussion skill for Claude Code</text>
</svg>
